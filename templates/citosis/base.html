{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="api-base" content="{{ api_base|default:'/api' }}" />
  <title>{% block title %}CITOSIS PRO - Tourism Management System{% endblock %}</title>
  <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/base.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/login.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/sidebar.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/topbar.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/app-shell.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/records.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/visitors.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/users.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/recycle.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/logs.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/modals.css' %}?v=20260327">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}?v=20260327">
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}

  <script>
    window.CITOSIS_CONFIG = {
      apiBase: "{{ api_base|default:'/api' }}",
    };
  </script>
  <script src="{% static 'js/citosis-pro.js' %}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
