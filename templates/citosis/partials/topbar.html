<header class="topbar">
  <div style="display:flex; align-items:center; gap:12px; min-width:0;">
    <button id="menuBtn" class="icon-btn mobile-only" aria-label="Open menu"><i class="fa-solid fa-bars"></i></button>
    <div class="topbar-title">
      <h1 id="pageTitle">Dashboard</h1>
      <p id="clockText">Loading date and time...</p>
    </div>
  </div>

  <div class="topbar-actions">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="globalSearch" type="text" placeholder="Search current page" />
    </div>
    <button class="icon-btn" id="themeBtn" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
    <input id="importInput" class="file-input-hidden" type="file" accept="application/json" />
    <button class="btn btn-danger" id="logoutTopBtn"><i class="fa-solid fa-right-from-bracket"></i>Logout</button>
  </div>
</header>
