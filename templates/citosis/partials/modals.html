<div id="modalBackdrop" class="modal-backdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <div>
        <h3 id="modalTitle">Add Item</h3>
        <p id="modalSubtitle">Fill in the required details.</p>
      </div>
      <button type="button" class="icon-btn" id="closeModalBtn" aria-label="Close modal"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <form id="entityForm">
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot">
        <button type="button" class="btn btn-ghost" id="cancelModalBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveModalBtn"><i class="fa-solid fa-floppy-disk"></i>Save</button>
      </div>
    </form>
  </div>
</div>

<div id="confirmBackdrop" class="confirm-backdrop" aria-hidden="true">
  <div class="confirm-box" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="confirm-head">
      <div>
        <h3 id="confirmTitle">Confirm action</h3>
        <p id="confirmSubtitle">Please review this action before continuing.</p>
      </div>
      <button type="button" class="icon-btn" id="closeConfirmBtn" aria-label="Close confirmation"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="confirmContent" class="confirm-content"></div>
    <div class="confirm-actions">
      <button type="button" class="btn btn-ghost" id="confirmCancelBtn">Cancel</button>
      <button type="button" class="btn btn-danger" id="confirmActionBtn">Confirm</button>
    </div>
  </div>
</div>

<div id="toastWrap" class="toast-wrap" aria-live="polite" aria-atomic="true"></div>
