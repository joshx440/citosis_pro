{% load static %}
<aside id="sidebar" class="sidebar">
  <div class="brand">
    <div class="brand-logo">
      <img src="{% static 'img/MC Seal.png' %}" alt="CITOSIS PRO logo" />
    </div>
    <div>
      <h2>CITOSIS PRO</h2>
      <small>Tourism Management Suite</small>
    </div>
  </div>

  <div class="nav-group">
    <button class="nav-btn active" data-page="dashboard"><i class="fa-solid fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-btn" data-page="records"><i class="fa-solid fa-map-location-dot"></i><span>Tourism Records</span><span class="nav-badge" id="badgeRecords">0</span></button>
    <button class="nav-btn" data-page="visitors"><i class="fa-solid fa-users"></i><span>Visitors</span><span class="nav-badge" id="badgeVisitors">0</span></button>
    <button class="nav-btn" data-page="users"><i class="fa-solid fa-user-gear"></i><span>Users</span><span class="nav-badge" id="badgeUsers">0</span></button>
    <button class="nav-btn" data-page="recycle"><i class="fa-solid fa-trash-can-arrow-up"></i><span>Recycle Bin</span><span class="nav-badge" id="badgeRecycle">0</span></button>
    <button class="nav-btn" data-page="logs"><i class="fa-solid fa-clock-rotate-left"></i><span>Activity Logs</span></button>
  </div>

  <div class="sidebar-footer">
    <p class="sidebar-note">Search, edit, recover, export, and monitor tourism office information from one responsive interface.</p>
    <button class="btn btn-danger" id="logoutSidebarBtn"><i class="fa-solid fa-right-from-bracket"></i>Logout</button>
  </div>
</aside>
